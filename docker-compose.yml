services:
  # ---------- Phase 1 ----------
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: lci-qdrant
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  # ---------- Phase 4 ----------
  # Self-hosted Langfuse v2 stack (server + postgres).
  # Start just this with: docker-compose up -d langfuse-db langfuse
  # Access the UI at http://localhost:3000
  langfuse-db:
    image: postgres:16-alpine
    container_name: lci-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - ./langfuse_data/db:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2
    container_name: lci-langfuse
    depends_on:
      - langfuse-db
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-me
      SALT: dev-salt-change-me
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    ports:
      - "3000:3000"
